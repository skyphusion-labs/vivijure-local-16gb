version: 2

# skyphusion-labs Dependabot standard — see fleet-chezmoi/docs/runbooks/dependabot-standard.md
# PRs only (never auto-merge). Group minor/patch; majors stay separate. Peer families bump together.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Validated CUDA recipe pins — bump only after benchmark-gated manual testing.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: "diffusers"
      - dependency-name: "transformers"
      - dependency-name: "torch"
      - dependency-name: "torchvision"
      - dependency-name: "av"
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
