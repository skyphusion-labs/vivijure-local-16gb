name: runner-snapshot (RETIRED)

# RETIRED 2026-07-20 (fc#754 Conrad ruling): Plane C `[self-hosted, gpu]` (vivijure-gpu-builds)
# supersedes GH image-generation / larger-runner snapshot lanes. Do not re-enable.
# Cost: two GPU servers beat GH heavy runners for vivijure image bakes.
# Snapshot custom images (`local-16gb-bake-snapshot`) are no longer consumed by publish/release workflows.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed
        run: |
          echo "::error::runner-snapshot retired (fc#754). Image bakes use Plane C [self-hosted, gpu]."
          exit 1
