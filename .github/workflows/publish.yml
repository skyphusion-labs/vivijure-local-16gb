name: Publish door image to GHCR

# Build + push the vivijure-local-16gb consumer-door image (CogVideoX i2v, runs on the user own GPU) so
# a novice PULLS a prebuilt image instead of cold-building torch layers on their box (Conrad ease-of-
# installation ruling; issue #23). Image + version come from a git TAG, never a parsed commit subject:
#
#   vX.Y.Z  ->  ghcr.io/skyphusion-labs/vivijure-local-16gb:X.Y.Z (+ :latest)
#
# A plain commit/branch push is a NO-OP: this workflow triggers ONLY on v* tags (or a maintainer
# workflow_dispatch). This pipeline BUILDS + PUSHES; it does not deploy anything (a local door has no
# serverless endpoint -- the operator pulls the image via docker-compose.yml).
#
# THIN BUILD: this image is `FROM <runtime base>@digest` + COPY src (see deploy/Dockerfile). The heavy
# CUDA/torch/deps install lives in the runtime base (deploy/runtime.Dockerfile, built by
# runtime-build.yml), so a src-only release re-pushes ONLY the app layer -- the ~10 min torch +
# diffusers/transformers install does NOT run here. That is the runner-cost win: the slow bake happens
# rarely (a toolchain bump or the monthly CVE floor), not on every release.
#
# Runner: the GitHub-hosted LARGER runner "vivijure-bake-local" (paid hosted-larger capacity, ~300GB
# disk). Kept here even though the build is now thin: `pull: true` fetches the ~8GB runtime base FROM,
# which unpacks larger than a standard ubuntu-latest runner's ~14GB free disk comfortably holds, so the
# headroom is still worth it (Conrad ruling 2026-07-04: we pay for capacity, we use it). Still fork-safe
# trivially: a hosted-larger runner is an ephemeral VM, AND this workflow triggers ONLY on v* tags +
# maintainer workflow_dispatch, which a fork cannot create, so packages:write is never exposed to a fork.
#
# NOTE vs vivijure-backend release.yml (the model): the backend BAKES ~90GB of weights (seed image, R2
# stage, bin-packed layers). This door BAKES NO weights (CogVideoX pulls on the first render into a
# volume), so its runtime base is a plain ~8GB CUDA/torch/deps image and this release is a plain thin
# build + push. GHCR auth uses the built-in GITHUB_TOKEN (packages:write below), least privilege.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version X.Y.Z (manual build; a tag build derives it from the tag)."
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: skyphusion-labs
  IMAGE: vivijure-local-16gb

jobs:
  build-and-push:
    runs-on: vivijure-bake-local
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve version
        id: cfg
        run: |
          set -eu
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VER="${{ inputs.version }}"
          else
            # github.ref_name is the tag on a tag push, e.g. "v0.1.0".
            TAG="${GITHUB_REF_NAME}"
            if [[ "${TAG}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VER="${BASH_REMATCH[1]}"
            else
              echo "::error::Tag '${TAG}' is not a vX.Y.Z release tag; nothing to build."
              exit 1
            fi
          fi
          if [[ ! "${VER}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version '${VER}' is not X.Y.Z"; exit 1
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${VER} (+ :latest)."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :X.Y.Z and :latest
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE }}:${{ steps.cfg.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE }}:latest

      - name: Summary
        run: |
          echo "Pushed ${IMAGE}:${{ steps.cfg.outputs.version }} and :latest to ${REGISTRY}/${OWNER}."
