# vivijure-local-16gb: ONE command -> the CogVideoX i2v render server on YOUR GPU + its own tunnel + a
# copy-paste "ready" banner. No tunnel setup, no networking knowledge. That's the whole bar:
# transparent + easy.
#
# PREREQS (one time): an NVIDIA GPU with 16GB+ VRAM (the measured floor) + an NVIDIA driver 550 or
# newer, Docker, and the NVIDIA Container
# Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
# Disk: about 35GB free (container image + the ~22GB weights).
#
# RUN:
#   cp .env.example .env    # then edit: your studio's R2 credentials (the one required setup step)
#   docker compose up       # PULLS the prebuilt image from GHCR (source hackers: `up --build` to build)
#   # ...wait for the banner from the `ready` service: it prints your Backend URL + token, copy-paste-ready.
#   # Paste those into your Vivijure studio's "Local (your GPU)" door. Done.
#
# SECURITY: the tunnel is PUBLIC, so the backend HARD-REJECTS any i2v request without the token (the
# i2v endpoint refuses to serve open). The token auto-generates if you don't set one; the banner shows it.

services:
  vivijure-local-16gb:
    # Pull-with-build-fallback: `docker compose up` PULLS this prebuilt image (the novice path). Source
    # hackers build locally with `docker compose up --build`, which builds from deploy/Dockerfile and
    # tags it with THIS same name, so the `ready` service below reuses it either way. pull_policy:
    # missing => pull once if not cached; `--build` / `docker compose build` force a local build.
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: ghcr.io/skyphusion-labs/vivijure-local-16gb:latest
    pull_policy: missing
    container_name: vivijure-local-16gb
    restart: unless-stopped
    expose:
      - "8000"                       # internal only; the tunnel is the way in
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      HF_HOME: "/models/hf"
    volumes:
      - vivijure_models:/models      # CogVideoX weights cache: pulled during the FIRST render, reused after
      - vivijure_runtime:/shared     # the token + tunnel log the `ready` banner reads
    # Generate a strong token if the operator left it blank, publish it to the shared volume for the
    # banner, then serve. Secure-by-default stays one-command (no open endpoint, no mandatory pre-step).
    command:
      - sh
      - -c
      - >
        if [ -z "$$LOCAL_BACKEND_TOKEN" ]; then
          export LOCAL_BACKEND_TOKEN=$$(python3 -c "import secrets; print(secrets.token_hex(24))");
        fi;
        mkdir -p /shared; printf "%s" "$$LOCAL_BACKEND_TOKEN" > /shared/token;
        exec python3 -m vivijure_local.core.server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # The tunnel (invisible to the user): a studio-reachable public URL with zero account/config.
  # DEFAULT: a TryCloudflare QUICK tunnel. cloudflared writes its log (including the URL line) to
  # /shared/cf.log via --logfile, where the `ready` banner reads it. No CF account, no domain, no login.
  # The cloudflare/cloudflared image is distroless (no shell), so cloudflared runs NATIVELY here (no sh
  # wrapper). For a stable NAMED tunnel, see docs/HOMELABBER.md "A stable address": a small
  # docker-compose.override.yml sets command: ["tunnel","run"] (cloudflared reads TUNNEL_TOKEN), so the
  # tracked file stays the novice quick-tunnel default.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vivijure-cloudflared
    restart: unless-stopped
    depends_on:
      - vivijure-local-16gb
    env_file:
      - .env
    volumes:
      - vivijure_runtime:/shared
    # cloudflared's own entrypoint is ["cloudflared","--no-autoupdate"], so command supplies only the
    # tunnel subcommand. --logfile writes the quick-tunnel URL to the shared volume for the banner.
    command: ["tunnel", "--url", "http://vivijure-local-16gb:8000", "--logfile", "/shared/cf.log"]

  # The "ready" banner: waits for the tunnel up + backend healthy + token written, then prints the
  # copy-paste Backend URL + token ONCE and idles. The user reads THIS, never the raw logs.
  ready:
    image: ghcr.io/skyphusion-labs/vivijure-local-16gb:latest
    container_name: vivijure-ready
    restart: unless-stopped
    depends_on:
      - vivijure-local-16gb
      - cloudflared
    env_file:
      - .env
    environment:
      ANNOUNCE_BACKEND: "http://vivijure-local-16gb:8000"
    volumes:
      - vivijure_runtime:/shared
    command: ["python3", "-m", "vivijure_local.core.announce"]

volumes:
  vivijure_models:
  vivijure_runtime:
